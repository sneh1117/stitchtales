<!-- blog/templates/partials/preview_overlay.html -->

<!-- Modal for signup (shown after 3 seconds for non-authenticated users) -->
<div id="previewOverlay" class="preview-overlay" style="display: none;">
    <div class="preview-blur-layer"></div>
    
    <div class="preview-modal">
        <button class="preview-modal-close" onclick="closePreviewModal()" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z"/>
            </svg>
        </button>
        
        <div class="preview-modal-content">
            <h2 style="color: var(--yarn-brown); margin-bottom: 1rem;">
                🧶 Want to read the full story?
            </h2>
            
            <p style="color: #666; margin-bottom: 1.5rem; font-size: 0.95rem;">
                Join StitchTales to unlock exclusive content, save your favorite posts, and connect with the crochet & knitting community.
            </p>
            
            <div class="preview-modal-buttons">
                <a href="{% url 'register' %}" class="btn btn-register-modal">
                    Create Free Account
                </a>
                <a href="{% url 'login' %}" class="btn btn-login-modal">
                    Already have an account? Sign in
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Preview overlay styling */
    .preview-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease-in-out;
    }
    
    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    
    .preview-blur-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
    }
    
    .preview-modal {
        position: relative;
        z-index: 9999;
        background: white;
        border-radius: 24px;
        padding: 2.5rem;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        animation: slideUp 0.4s ease-out;
    }
    
    @keyframes slideUp {
        from {
            transform: translateY(30px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    
    .preview-modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        cursor: pointer;
        color: #999;
        transition: color 0.2s;
        padding: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .preview-modal-close:hover {
        color: var(--yarn-brown);
    }
    
    .preview-modal-content {
        text-align: center;
    }
    
    .preview-modal-buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }
    
    .btn-register-modal {
        background: linear-gradient(135deg, var(--yarn-purple), var(--yarn-pink)) !important;
        color: white !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 0.85rem 1.5rem !important;
        font-size: 0.95rem !important;
        font-weight: 600 !important;
        text-decoration: none !important;
        display: block !important;
        transition: opacity 0.2s, transform 0.2s !important;
    }
    
    .btn-register-modal:hover {
        opacity: 0.9 !important;
        transform: translateY(-2px) !important;
        color: white !important;
    }
    
    .btn-login-modal {
        background: #f5f5f5 !important;
        color: var(--yarn-purple) !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 0.85rem 1.5rem !important;
        font-size: 0.95rem !important;
        font-weight: 500 !important;
        text-decoration: none !important;
        display: block !important;
        transition: background 0.2s, transform 0.2s !important;
    }
    
    .btn-login-modal:hover {
        background: #ebebeb !important;
        color: var(--yarn-purple) !important;
        transform: translateY(-2px) !important;
    }
    
    /* Content blur effect */
    .content-blurred article.card {
        filter: blur(8px);
        pointer-events: none;
        user-select: none;
    }
    
    .content-blurred .sidebar-card {
        filter: blur(8px);
        pointer-events: none;
        user-select: none;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Only show preview for non-authenticated users
        const isAuthenticated = {% if user.is_authenticated %}true{% else %}false{% endif %};
        const postAuthor = '{{ post.author.username }}';
        const currentUser = '{{ user.username }}';
        
        // Don't show overlay if user is authenticated OR if user is the post author
        if (!isAuthenticated && postAuthor !== currentUser) {
            // Start 3-second timer
            setTimeout(function() {
                activatePreview();
            }, 3000);
        }
    });
    
    function activatePreview() {
        // Blur the content
        document.querySelector('.row').classList.add('content-blurred');
        
        // Show the modal
        document.getElementById('previewOverlay').style.display = 'flex';
        
        // Prevent scrolling
        document.body.style.overflow = 'hidden';
    }
    
    function closePreviewModal() {
        // Remove blur
        document.querySelector('.row').classList.remove('content-blurred');
        
        // Hide modal
        document.getElementById('previewOverlay').style.display = 'none';
        
        // Re-enable scrolling
        document.body.style.overflow = 'auto';
    }
    
    // Close modal when clicking outside
    document.addEventListener('click', function(event) {
        const modal = document.getElementById('previewOverlay');
        if (modal.style.display === 'flex') {
            const modalContent = document.querySelector('.preview-modal');
            if (event.target === modal || (!modalContent.contains(event.target) && event.target.id === 'previewOverlay')) {
                // Allow closing by clicking on blur layer
                closePreviewModal();
            }
        }
    });
    
    // Prevent close on modal content click
    document.addEventListener('click', function(event) {
        const modalContent = document.querySelector('.preview-modal');
        if (modalContent && event.target.closest('.preview-modal')) {
            event.stopPropagation();
        }
    });
</script>
